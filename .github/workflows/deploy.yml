name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (defaults to commit SHA)'
        required: false
        type: string
      deploy:
        description: 'Run the deploy step'
        required: false
        type: boolean
        default: false
      environment:
        description: 'Target environment for the deploy step'
        required: false
        type: choice
        options:
          - staging
          - production
        default: staging

concurrency:
  group: deploy-hetzner-${{ inputs.environment || 'production' }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # Builds and pushes to GHCR on push-to-main and on manual dispatch.
  # Feature-branch pushes don't build by default (wasteful) — use
  # workflow_dispatch from the Actions tab to build/deploy any branch
  # for staging or first-time bootstrap. Tagging:
  #   - <12-char-sha>           always
  #   - <branch-name slugified> always
  #   - latest                  only on main
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve primary tag
        id: meta
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_SHA::12}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Compute Docker tags
        id: tags
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.tag }}
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy only on main pushes, or when workflow_dispatch was invoked with
  # deploy=true. Feature-branch pushes stop after build — useful for
  # publishing an image to GHCR before the prod box is reachable.
  deploy:
    needs: [build]
    if: ${{ github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.deploy) }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: https://${{ vars.APP_DOMAIN }}
    steps:
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          test -n "$SSH_KEY" || { echo "HETZNER_SSH_KEY is empty for environment '${{ inputs.environment || 'production' }}'"; exit 1; }
          test -n "$HOST"    || { echo "HETZNER_HOST is empty for environment '${{ inputs.environment || 'production' }}'"; exit 1; }
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Debug SSH credentials
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          echo "::group::Key file"
          ls -l ~/.ssh/id_ed25519
          wc -c ~/.ssh/id_ed25519
          head -1 ~/.ssh/id_ed25519
          tail -1 ~/.ssh/id_ed25519
          echo "::endgroup::"

          echo "::group::Key fingerprint (compare against server's authorized_keys)"
          ssh-keygen -lf ~/.ssh/id_ed25519 || echo "ssh-keygen could not parse the private key — secret is malformed"
          ssh-keygen -yf ~/.ssh/id_ed25519 | ssh-keygen -lf - || true
          echo "::endgroup::"

          echo "::group::Target"
          echo "user length: ${#USER}"
          echo "host length: ${#HOST}"
          echo "::endgroup::"

          echo "::group::Verbose SSH probe (will fail loudly with the server's reason)"
          ssh -vvv -o BatchMode=yes -o ConnectTimeout=10 "$USER@$HOST" true || true
          echo "::endgroup::"

      - name: Deploy
        env:
          TAG: ${{ needs.build.outputs.tag }}
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh -v "$USER@$HOST" "IMAGE_TAG=$TAG /srv/virtua-fc/scripts/deploy.sh"

      - name: Smoke test
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh "$USER@$HOST" "/srv/virtua-fc/scripts/smoketest.sh"

      - name: Rollback on failure
        if: failure()
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh "$USER@$HOST" "/srv/virtua-fc/scripts/rollback.sh"
